name: test-format

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install formatters
        run: |
          git clone --depth 1 --branch v2.5.0 https://github.com/numtide/treefmt.git /tmp/treefmt
          mkdir -p "$GITHUB_WORKSPACE/bin"
          go build -C /tmp/treefmt -o "$GITHUB_WORKSPACE/bin/treefmt"
          echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"
          npm install --global prettier

      - name: Check formatting
        run: treefmt --fail-on-change
