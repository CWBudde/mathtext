name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  fmt:
    name: treefmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install formatters
        run: |
          git clone --depth 1 --branch v2.5.0 https://github.com/numtide/treefmt.git /tmp/treefmt
          mkdir -p "$GITHUB_WORKSPACE/bin"
          go build -C /tmp/treefmt -o "$GITHUB_WORKSPACE/bin/treefmt"
          echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"
          npm install --global prettier
      - name: Check formatting
        run: treefmt --fail-on-change

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22", "1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  unit:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.22", "1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -coverprofile=cover.out ./...
